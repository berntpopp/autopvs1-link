services:
  autopvs1-link:
    env_file:
      - path: ../.env.docker.example
        required: false
    environment:
      AUTOPVS1_LINK_LOG_LEVEL: INFO
      AUTOPVS1_LINK_LOG_JSON_FORMAT: "true"
      AUTOPVS1_LINK_PORT: 8000
    ports: !reset []
    expose:
      - "8000"

    volumes: []

    read_only: true
    tmpfs:
      - /tmp/autopvs1-link:rw,noexec,nosuid,size=64m,mode=1777
      # gunicorn's control server writes a socket under the app user's home;
      # give it a writable tmpfs so a read_only rootfs doesn't error on boot.
      - /home/app/.gunicorn:rw,noexec,nosuid,size=8m,mode=1777

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    pids_limit: 256
    init: true

    command: ["gunicorn", "-c", "gunicorn_conf.py", "autopvs1_link.server_manager:app"]

    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
          pids: 256
        reservations:
          memory: 256M
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

    # Bound log growth (Standard v1 rule 24); overrides the base 10m x 3.
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=autopvs1-link,environment=production"
