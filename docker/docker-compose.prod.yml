services:
  autopvs1-link:
    build: !reset null
    image: ${AUTOPVS1_LINK_IMAGE:?set a verified digest-addressed image}
    pull_policy: missing
    container_name: !reset null
    env_file: !reset []
    environment:
      # Drives the production preset: debug=False, level=WARNING (suppresses
      # the per-request INFO log line that can carry variant IDs), JSON logs.
      AUTOPVS1_LINK_ENVIRONMENT: production
      AUTOPVS1_LINK_LOG_JSON_FORMAT: "true"
      AUTOPVS1_LINK_PORT: 8000
      # Public research profile only. Patient-data deployments should omit
      # this backend unless equivalent self-hosted origins are approved.
      AUTOPVS1_LINK_API_EGRESS_MODE: allowlist
      AUTOPVS1_LINK_API_ALLOWED_UPSTREAM_ORIGINS: >-
        https://autopvs1.bgi.com,https://rest.ensembl.org,https://grch37.rest.ensembl.org
      GF_HEALTHCHECK_HOST: localhost
    ports: !reset []
    expose:
      - "8000"

    volumes: []

    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    init: true

    command: !reset null

    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
          pids: 256

    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - 'curl -f -H "Host: $${GF_HEALTHCHECK_HOST}" http://localhost:8000/health'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Bound log growth (Standard v1 rule 24); overrides the base 10m x 3.
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=autopvs1-link,environment=production"
