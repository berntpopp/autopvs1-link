services:
  autopvs1-link:
    env_file:
      - path: ../.env.docker.example
        required: false
    environment:
      AUTOPVS1_LINK_LOG_LEVEL: INFO
      AUTOPVS1_LINK_LOG_JSON_FORMAT: "true"
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
