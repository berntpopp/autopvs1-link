# Pin the compose project name so layering base+prod+npm does not default to
# the parent dir ("docker") and collide with other services' default project.
name: autopvs1-link-npm

services:
  autopvs1-link:
    # `docker-compose.prod.yml` sets `container_name: !reset null`, which is right for the
    # standalone production stack it targets. The NPM topology cannot tolerate it: Nginx
    # Proxy Manager routes by forwarding to a HOSTNAME on the shared npm network, and that
    # hostname is the CONTAINER NAME — the live proxy host emits
    # `proxy_pass http://autopvs1_link_server:8000;`. With the name reset, Compose would
    # name the container `autopvs1-link-npm-autopvs1-link-1`, NPM could not resolve
    # `autopvs1_link_server`, and autopvs1-link.genefoundry.org would 502. The management
    # tooling (config/projects.yaml -> `containers:`) also addresses this container by name.
    # So the NPM overlay must UNDO prod.yml's reset.
    container_name: autopvs1_link_server

    ports: !reset []
    expose:
      - "8000"
    environment:
      # The DNS-rebinding guard allowlists loopback only by default. Behind NPM
      # the container sees the proxied public Host, so it must be listed here or
      # every request through the proxy -- including the genefoundry-router
      # federating /mcp -- is rejected with HTTP 421.
      AUTOPVS1_LINK_SERVER_ALLOWED_HOSTS: >-
        ["localhost","127.0.0.1","::1","autopvs1-link.genefoundry.org"]
      AUTOPVS1_LINK_SERVER_ALLOWED_ORIGINS: >-
        ["https://autopvs1-link.genefoundry.org"]
    networks:
      - npm
    labels:
      - "npm.proxy=true"

networks:
  npm:
    external: true
    # Must match the network the Nginx Proxy Manager container is attached to
    # (npm_default on the GeneFoundry VPS), not NPM's own compose-default net.
    name: ${NPM_SHARED_NETWORK_NAME:-npm_default}
