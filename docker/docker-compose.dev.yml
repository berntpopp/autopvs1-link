services:
  autopvs1-link:
    environment:
      AUTOPVS1_LINK_LOG_LEVEL: DEBUG
    volumes:
      - ../autopvs1_link:/home/app/web/autopvs1_link:ro
    command:
      [
        "uvicorn",
        "autopvs1_link.server_manager:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
